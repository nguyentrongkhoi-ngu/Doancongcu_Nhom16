name: CinemaBooking CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature/nguyentrongkhoi
  pull_request:
    branches:
      - main

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/cinemabooking
  DOTNET_VERSION: '8.0.x'

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Code format check
        run: dotnet format CinemaBooking/CinemaBooking.csproj --verify-no-changes

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore dependencies
        run: dotnet restore CinemaBooking/CinemaBooking.csproj
      - name: Build project
        run: dotnet build CinemaBooking/CinemaBooking.csproj --no-restore -c Release
      - name: Run tests (if any)
        run: |
          if [ -f CinemaBooking/CinemaBooking.sln ]; then
            dotnet test CinemaBooking/CinemaBooking.csproj --no-build -c Release || echo "No tests found"
          fi

  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/feature/nguyentrongkhoi')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=dev-khoi,enable=${{ github.ref == 'refs/heads/feature/nguyentrongkhoi' }}
            type=sha,prefix=sha-,format=short
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./CinemaBooking
          file: ./CinemaBooking/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:latest
          format: 'table'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/cinemabooking || mkdir -p /opt/cinemabooking && cd /opt/cinemabooking
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} docker compose -f docker-compose.prod.yml pull
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} \
            DB_CONNECTION_STRING="${{ secrets.DB_CONNECTION_STRING }}" \
            SA_PASSWORD="${{ secrets.SA_PASSWORD }}" \
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
