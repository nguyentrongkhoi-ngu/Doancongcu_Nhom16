name: CinemaBooking CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # Giai đoạn 1: Kiểm tra định dạng Code
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Verify Formatting
        run: dotnet format CinemaBooking/CinemaBooking.csproj --verify-no-changes

  # Giai đoạn 2: Build và Test (Đảm bảo code không có lỗi logic)
  build-and-test:
    name: Build & Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore & Build
        run: |
          dotnet restore CinemaBooking/CinemaBooking.csproj
          dotnet build CinemaBooking/CinemaBooking.csproj --configuration Release --no-restore

      - name: Run Unit Tests
        run: dotnet test CinemaBooking/CinemaBooking.csproj --configuration Release --no-build

  # Giai đoạn 3: Đóng gói Docker (Chỉ chạy khi push vào main/develop)
  docker-build-push:
    name: Docker Build & Push
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set Image Tag
        id: vars
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "TAG=latest" >> $GITHUB_OUTPUT
          else
            echo "TAG=staging" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./CinemaBooking/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cinemabooking:${{ steps.vars.outputs.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Giai đoạn 4: Quét bảo mật (Security Scan)
  security-scan:
    name: Security Scan
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/cinemabooking:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'

  # Giai đoạn 5: Tự động triển khai (Deploy - Chỉ chạy khi push vào main)
  deploy:
    name: Deploy to Production
    needs: security-scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/cinemabooking
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
