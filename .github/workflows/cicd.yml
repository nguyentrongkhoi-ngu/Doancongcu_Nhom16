name: CinemaBooking CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature/nguyentrongkhoi # Bạn đang làm việc trên nhánh này
  pull_request:
    branches:
      - main
      - develop

jobs:
  # 1. Kiểm tra định dạng Code (Lint & Format)
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Verify Formatting
        run: dotnet format CinemaBooking/CinemaBooking.csproj --verify-no-changes

  # 2. Xây dựng và Chạy Unit Test (Build & Test)
  build-and-test:
    name: Build & Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Dependencies
        run: dotnet restore CinemaBooking/CinemaBooking.csproj

      - name: Build Project
        run: dotnet build CinemaBooking/CinemaBooking.csproj --configuration Release --no-restore

      - name: Run Unit Tests
        run: dotnet test CinemaBooking/CinemaBooking.csproj --configuration Release --no-build --verbosity normal

  # 3. Đóng gói Docker và Đẩy lên Docker Hub (Docker Build & Push)
  docker-build-push:
    name: Docker Build & Push
    needs: build-and-test
    runs-on: ubuntu-latest
    # Chỉ chạy stage này trên nhánh main, develop hoặc feature của bạn
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/feature/nguyentrongkhoi'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine Docker Tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "TAG=latest" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "TAG=staging" >> $GITHUB_OUTPUT
          else
            echo "TAG=dev-khoi" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./CinemaBooking/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cinemabooking:${{ steps.tag.outputs.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 4. Quét bảo mật (Security Scan - Trivy)
  security-scan:
    name: Security Scan (Trivy)
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/cinemabooking:dev-khoi'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # 5. Triển khai lên Server (Deploy to Production)
  deploy:
    name: Deploy to Production
    needs: security-scan
    runs-on: ubuntu-latest
    # Chỉ deploy trên nhánh main (Production)
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/cinemabooking
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker system prune -f
